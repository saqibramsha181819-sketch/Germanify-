<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow for German Words</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --correct-glow: rgba(34, 197, 94, 0.2);
            --wrong-glow: rgba(239, 68, 68, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            will-change: transform;
        }

        .circle {
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .square {
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        @keyframes floatSlow {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-40px) translateX(20px) rotate(180deg); }
            100% { transform: translateY(0) translateX(0) rotate(360deg); }
        }

        .app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 50px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .screen {
            display: none;
            width: 100%;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mode-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .quiz-opt-btn {
            border-color: rgba(255, 255, 255, 0.15) !important;
            background: rgba(255, 255, 255, 0.05) !important;
        }
        
        .sentences-opt-btn {
            border-color: rgba(255, 255, 255, 0.25) !important;
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .stories-opt-btn {
            border-color: rgba(168, 85, 247, 0.4) !important;
            background: rgba(168, 85, 247, 0.08) !important;
        }

        .floating-opt {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 22px;
            border-radius: 16px;
            color: var(--text-color);
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .floating-opt:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media (max-width: 500px) {
            .category-grid { grid-template-columns: 1fr; }
        }

        .flowchart-workspace {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 20px;
        }

        .flow-node {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 24px;
            width: 85%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            position: relative;
        }

        .flow-connector {
            width: 2px;
            height: 25px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
            position: relative;
        }

        .flow-connector::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 4px 0 4px;
            border-style: solid;
            border-color: rgba(255,255,255,0.15) transparent transparent transparent;
        }

        .node-left { font-size: 18px; font-weight: 700; max-width: 55%; word-break: break-word; }
        .node-right { font-size: 15px; color: rgba(255, 255, 255, 0.5); max-width: 40%; text-align: right; word-break: break-word; }

        .back-btn {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.2s ease;
        }

        .back-btn:hover { background: rgba(255,255,255,0.1); color: #ffffff; }

        .quiz-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        .quiz-progress {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quiz-question {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .quiz-options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .quiz-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .quiz-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .quiz-btn.correct {
            background: rgba(34, 197, 94, 0.15) !important;
            border-color: #22c55e !important;
            box-shadow: 0 0 20px var(--correct-glow);
        }

        .quiz-btn.wrong {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px var(--wrong-glow);
        }

        .score-layout {
            text-align: center;
            padding: 20px 0;
        }

        .score-val {
            font-size: 48px;
            font-weight: 900;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .story-header-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .action-toggle-btn {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            color: #e9d5ff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .action-toggle-btn:hover {
            background: rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.3);
        }

        .story-display-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .story-title-view {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            color: #f3e8ff;
        }

        .story-interactive-pane {
            font-size: 18px;
            line-height: 1.8;
            letter-spacing: 0.3px;
            color: #f4f4f5;
        }

        .story-interactive-pane p {
            margin-bottom: 20px;
        }

        .interactive-word {
            display: inline-block;
            cursor: pointer;
            border-bottom: 1px dashed rgba(255,255,255,0.25);
            padding: 0 2px;
            transition: all 0.15s ease;
            border-radius: 4px;
        }

        .interactive-word:hover {
            background: rgba(255,255,255,0.15);
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .translation-overlay-box {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed rgba(168, 85, 247, 0.3);
            color: #d4d4d8;
            font-size: 16px;
            line-height: 1.7;
            font-style: italic;
            animation: fadeIn 0.3s ease-out;
        }

        .translation-overlay-box.visible {
            display: block;
        }

        .dict-popover-chatbox {
            position: absolute;
            z-index: 1000;
            background: #18181b;
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 12px;
            padding: 10px 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), 0 0 15px rgba(168, 85, 247, 0.2);
            font-size: 14px;
            max-width: 200px;
            color: #ffffff;
            display: none;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            animation: popUpAnim 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dict-popover-chatbox::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0 6px;
            border-style: solid;
            border-color: #18181b transparent transparent transparent;
        }

        @keyframes popUpAnim {
            from { opacity: 0; transform: translate(-50%, -90%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -100%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-shapes" id="shapesLayer"></div>
    <div class="dict-popover-chatbox" id="globalDictBox"></div>

    <div class="app-container">
        <h1>Flow for German Words</h1>

        <div class="screen active" id="modeScreen">
            <div class="mode-menu">
                <div class="floating-opt" data-action="vocab" data-mode="de-en">German to English</div>
                <div class="floating-opt" data-action="vocab" data-mode="en-de">English to German</div>
                <div class="floating-opt" data-action="vocab" data-mode="random">Random Mix Mode</div>
                <div class="floating-opt quiz-opt-btn" data-action="vocab" data-mode="quiz">⚡ Practice Quiz Engine</div>
                <div class="floating-opt sentences-opt-btn" data-action="sentences">💬 70 Basic Essential Sentences</div>
                <div class="floating-opt stories-opt-btn" data-action="stories">📖 German Stories Module</div>
            </div>
        </div>

        <div class="screen" id="categoryScreen">
            <button class="back-btn" id="categoryBackBtn">← Back</button>
            <div class="category-grid" id="categoryGridContainer"></div>
        </div>

        <div class="screen" id="flowchartScreen">
            <button class="back-btn" id="flowchartBackBtn">← Back</button>
            <div class="flowchart-workspace" id="flowchartWorkspace"></div>
        </div>

        <div class="screen" id="quizScreen">
            <button class="back-btn" onclick="navigateTo('categoryScreen')">← Quit Quiz</button>
            <div class="quiz-container" id="quizContainerBox"></div>
        </div>

        <div class="screen" id="storyReaderScreen">
            <div class="story-header-bar">
                <button class="back-btn" style="margin-bottom:0;" id="readerBackBtn">← Back to List</button>
                <button class="action-toggle-btn" id="toggleTranslationBtn">Translation</button>
            </div>
            <div class="story-display-card" id="storyDisplayCardArea"></div>
        </div>
    </div>

                    de: "Es ist Samstagmorgen, acht Uhr. Lukas geht heute nicht zur Arbeit, denn es ist Wochenende. Er nimmt eine große Tasche und geht zum Marktplatz in der Stadt. Jeden Samstag gibt es dort einen großen Markt mit frischen Produkten aus der Region. Lukas kauft zuerst ein Kilo rote Äpfel und ein paar Bananen bei einem netten Verkäufer. Dann geht er zum Gemüsestand. Er braucht Kartoffeln, Tomaten, Zwiebeln und Knoblauch für das Mittagessen. Er möchte heute eine leckere Gemüsesuppe kochen. Die Preise auf dem Markt sind nicht zu teuer und die Qualität ist sehr gut. Am Ende kauft Lukas noch ein frisches Brot in der Bäckerei an der Ecke und ein Stück Käse. Auf dem Rückweg trifft er seinen Nachbarn herrn Maier. Sie sprechen kurz über das Wetter und die Pläne für die kommende Woche. Danach läuft Lukas glücklich nach Hause.",
                    en: "It is Saturday morning, eight o'clock. Lukas is not going to work today because it is the weekend. He takes a big bag and goes to the market square in the city. Every Saturday there is a big market there with fresh products from the region. Lukas first buys a kilo of red apples and a few bananas from a nice salesman. Then he goes to the vegetable stall. He needs potatoes, tomatoes, onions, and garlic for lunch. He wants to cook a delicious vegetable soup today. The prices at the market are not too expensive and the quality is very good. At the end, Lukas buys a fresh loaf of bread at the bakery on the corner and a piece of cheese. On the way back, he meets his neighbor Mr. Maier. They speak briefly about the weather and plans for the coming week. After that, Lukas walks home happily."
                },
                {
                    title: "Ein neuer Mitbewohner (A New Flatmate)",
                    de: "Thomas wohnt in einer großen Wohnung in München. Die Wohnung hat drei Zimmer, eine Küche und ein Bad. Die Miete ist sehr teuer, deshalb sucht Thomas einen Mitbewohner. Letzte Woche hat er eine Anzeige im Internet geschrieben. Viele Studenten haben angerufen und wollten das Zimmer sehen. Gestern war David da. David kommt aus London, ist zwanzig Jahre alt und studiert jetzt Medizin an der Universität in München. Er spricht schon ein bisschen Deutsch, möchte aber noch viel mehr lernen. David ist sehr ruhig, höflich und ordentlich. Er mag Musik und spielt Gitarre. Thomas fand David sofort sympathisch. Sie haben zusammen einen Kaffee getrunken und den Mietvertrag unterschrieben. Nächste Woche zieht David mit seinen Koffern ein. Thomas freut sich auf die gemeinsame Zeit in der Wohngemeinschaft.",
                    en: "Thomas lives in a big apartment in Munich. The apartment has three rooms, a kitchen, and a bathroom. The rent is very expensive, therefore Thomas is looking for a flatmate. Last week he posted an ad on the internet. Many students called and wanted to see the room. Yesterday David was there. David comes from London, is twenty years old, and is now studying medicine at the university in Munich. He already speaks a little German but wants to learn much more. David is very quiet, polite, and tidy. He likes music and plays the guitar. Thomas liked David immediately. They drank a coffee together and signed the rental agreement. Next week David moves in with his suitcases. Thomas looks forward to the time together in the shared apartment."
                },
                {
                    title: "Mein Hobby: Fotografie (My Hobby: Photography)",
                    de: "Jeder Mensch braucht ein Hobby als Ausgleich zur Arbeit. Mein Name ist Felix und mein großes Hobby ist die Fotografie. Ich habe eine professionelle Kamera von meinem Vater bekommen. Am Wochenende gehe ich oft in die Natur, um Landschaften, Bäume und Vögel zu fotografieren. Manchmal fahre ich auch in die Stadt und mache Fotos von der alten Architektur, den Brücken und den Menschen auf der Straße. Ich finde es faszinierend, wie ein Foto einen besonderen Moment für immer festhalten kann. Am Abend setze ich mich an meinen Computer und organisiere die Bilder in Ordnern. Letzten Monat habe ich sogar einen kleinen Preis bei einem Wettbewerb gewonnen! Meine Freunde sagen, meine Fotos sind wunderschön. Mein großer Traum ist es, in der Zukunft eine eigene Ausstellung in einer Galerie zu haben oder ein Buch mit meinen besten Bildern zu veröffentlichen.",
                    en: "Every person needs a hobby to balance work. My name is Felix and my big hobby is photography. I got a professional camera from my father. On the weekend I often go into nature to photograph landscapes, trees, and birds. Sometimes I also drive into the city and take photos of the old architecture, bridges, and people on the street. I find it fascinating how a photo can capture a special moment forever. In the evening I sit at my computer and organize the pictures into folders. Last month I even won a small prize in a competition! My friends say my photos are beautiful. My big dream is to have my own exhibition in a gallery in the future or to publish a book with my best pictures."
                }
            ]
        };

        const categoriesConfig = [
            {id: "basic", name: "Basic Words"}, {id: "relations", name: "Relations"},
            {id: "numbers", name: "Numbers & Time"}, {id: "tasks", name: "Tasks & Verbs"},
            {id: "emotions", name: "Emotions & Traits"}, {id: "food", name: "Food & Drinks"},
            {id: "places", name: "Places & Travel"}, {id: "nature", name: "Nature & Weather"},
            {id: "objects", name: "Everyday Objects"}, {id: "professions", name: "Professions & Study"}
        ];

        const lowSatColors = [
            'rgba(173, 193, 230, 0.08)', 'rgba(235, 188, 188, 0.08)',
            'rgba(180, 225, 200, 0.08)', 'rgba(238, 222, 186, 0.08)',
            'rgba(215, 198, 237, 0.08)', 'rgba(182, 222, 229, 0.08)'
        ];

        let selectedMode = ''; 
        let selectedCategory = '';
        let quizQuestionsPool = [];
        let currentQuestionIdx = 0;
        let userQuizScore = 0;
        let isOptionProcessing = false;

        const shapesLayer = document.getElementById('shapesLayer');
        function generateBackgroundGeometry() {
            const count = 15;
            for(let i=0; i<count; i++) {
                const shape = document.createElement('div');
                const isCircle = Math.random() > 0.5;
                shape.className = `shape ${isCircle ? 'circle' : 'square'}`;
                const size = Math.random() * 100 + 70;
                shape.style.width = `${size}px`;
                shape.style.height = `${size}px`;
                shape.style.background = lowSatColors[Math.floor(Math.random() * lowSatColors.length)];
                shape.style.left = `${Math.random() * 90}%`;
                shape.style.top = `${Math.random() * 90}%`;
                const duration = Math.random() * 20 + 20;
                shape.style.animation = `floatSlow ${duration}s linear infinite alternate`;
                shape.style.animationDelay = `-${Math.random() * 20}s`;
                shapesLayer.appendChild(shape);
            }
        }
        generateBackgroundGeometry();

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('globalDictBox').style.display = 'none';
            window.scrollTo(0,0);
        }

        // Fixed Menu Clicking logic
        document.querySelectorAll('#modeScreen .floating-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                const action = opt.getAttribute('data-action');
                selectedMode = opt.getAttribute('data-mode');
                
                if (action === 'sentences') {
                    generateSentencesFlowchart();
                    navigateTo('flowchartScreen');
                } else if (action === 'stories') {
                    buildStoriesSubMenu();
                    navigateTo('categoryScreen');
                } else if (action === 'vocab') {
                    buildCategoryGrid();
                    navigateTo('categoryScreen');
                }
            });
        });

        function buildCategoryGrid() {
            const container = document.getElementById('categoryGridContainer');
            const backBtn = document.getElementById('categoryBackBtn');
            container.innerHTML = '';
            backBtn.onclick = () => navigateTo('modeScreen');

            categoriesConfig.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'floating-opt';
                item.textContent = cat.name;
                item.addEventListener('click', () => {
                    selectedCategory = cat.id;
                    if (selectedMode === 'quiz') {
                        initiateQuizFlow();
                    } else {
                        generateFlowchartData();
                        navigateTo('flowchartScreen');
                    }
                });
                container.appendChild(item);
            });

            const mixedOpt = document.createElement('div');
            mixedOpt.className = 'floating-opt';
            mixedOpt.style.gridColumn = '1 / -1';
            mixedOpt.style.background = 'rgba(255,255,255,0.05)';
            mixedOpt.textContent = "⚡ Full Random Mix Session";
            mixedOpt.addEventListener('click', () => {
                selectedCategory = 'all_mixed';
                if (selectedMode === 'quiz') {
                    initiateQuizFlow();
                } else {
                    generateFlowchartData();
                    navigateTo('flowchartScreen');
                }
            });
            container.appendChild(mixedOpt);
        }

        function buildStoriesSubMenu() {
            const container = document.getElementById('categoryGridContainer');
            const backBtn = document.getElementById('categoryBackBtn');
            container.innerHTML = '';
            backBtn.onclick = () => navigateTo('modeScreen');

            const storyTiers = [
                { id: "short", name: "1) Very Simple & Short (10 Lines Basics)" },
                { id: "moderate", name: "2) Moderate Easy (Long Child Stories)" },
                { id: "a1final", name: "3) Final A1 Framework Stories" }
            ];

            storyTiers.forEach(tier => {
                const optNode = document.createElement('div');
                optNode.className = 'floating-opt';
                optNode.style.gridColumn = '1 / -1';
                optNode.style.borderColor = 'rgba(168, 85, 247, 0.25)';
                optNode.textContent = tier.name;
                optNode.addEventListener('click', () => {
                    renderStoriesListTitles(tier.id);
                });
                container.appendChild(optNode);
            });
        }

        function renderStoriesListTitles(tierId) {
            const container = document.getElementById('categoryGridContainer');
            const backBtn = document.getElementById('categoryBackBtn');
            container.innerHTML = '';
            backBtn.onclick = () => buildStoriesSubMenu();

            const selectedList = storiesRepository[tierId];
            selectedList.forEach((story) => {
                const titleBlock = document.createElement('div');
                titleBlock.className = 'floating-opt';
                titleBlock.style.gridColumn = '1 / -1';
                titleBlock.innerHTML = `📖 <span style="color:#e9d5ff; margin-left:8px;">${story.title}</span>`;
                titleBlock.addEventListener('click', () => {
                    launchStoryReaderCanvas(story, tierId);
                });
                container.appendChild(titleBlock);
            });
        }

        function launchStoryReaderCanvas(storyObject, tierId) {
            const displayCard = document.getElementById('storyDisplayCardArea');
            const transBtn = document.getElementById('toggleTranslationBtn');
            const backBtn = document.getElementById('readerBackBtn');

            backBtn.onclick = () => {
                renderStoriesListTitles(tierId);
                navigateTo('categoryScreen');
            };

            displayCard.innerHTML = `
                <div class="story-title-view">${storyObject.title}</div>
                <div class="story-interactive-pane" id="interactiveTextPane"></div>
                <div class="translation-overlay-box" id="storyTranslationBox">${storyObject.en}</div>
            `;

            const textPane = document.getElementById('interactiveTextPane');
            const paragraphs = storyObject.de.split('\n');
            
            paragraphs.forEach(para => {
                const paragraphNode = document.createElement('p');
                const wordTokens = para.split(' ');
                
                wordTokens.forEach(token => {
                    const cleanLookupKey = token.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").toLowerCase();
                    const spanWord = document.createElement('span');
                    spanWord.className = 'interactive-word';
                    spanWord.textContent = token + ' ';
                    
                    spanWord.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showGlobalDictPopupBubble(cleanLookupKey, e);
                    });
                    
                    paragraphNode.appendChild(spanWord);
                });
                textPane.appendChild(paragraphNode);
            });

            transBtn.onclick = () => {
                const transBox = document.getElementById('storyTranslationBox');
                transBox.classList.toggle('visible');
            };

            navigateTo('storyReaderScreen');
        }

        function showGlobalDictPopupBubble(wordKey, event) {
            const popbox = document.getElementById('globalDictBox');
            let definition = DictionaryWordsMapping[wordKey];
            if(!definition) {
                definition = "A1 Core Structural Word";
            }
            popbox.innerHTML = `<strong style="color:#c084fc;">${wordKey}</strong>: ${definition}`;
            popbox.style.display = 'block';
            popbox.style.left = `${event.pageX}px`;
            popbox.style.top = `${event.pageY}px`;
        }

        document.addEventListener('click', () => {
            document.getElementById('globalDictBox').style.display = 'none';
        });

        function generateSentencesFlowchart() {
            const container = document.getElementById('flowchartWorkspace');
            const backBtn = document.getElementById('flowchartBackBtn');
            container.innerHTML = '';
            backBtn.onclick = () => navigateTo('modeScreen');

            sentencesData.forEach((item, index) => {
                const node = document.createElement('div');
                node.className = 'flow-node';
                node.style.width = '95%'; 
                node.innerHTML = `
                    <div class="node-left" style="font-size: 16px;">${item.en}</div>
                    <div class="node-right" style="font-size: 16px; color:#a1a1aa;">${item.de}</div>
                `;
                container.appendChild(node);
                if (index < sentencesData.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'flow-connector';
                    container.appendChild(connector);
                }
            });
        }

        function generateFlowchartData() {
            const container = document.getElementById('flowchartWorkspace');
            const backBtn = document.getElementById('flowchartBackBtn');
            container.innerHTML = '';
            backBtn.onclick = () => navigateTo('categoryScreen');
            
            let localPool = [];
            if (selectedCategory === 'all_mixed' || selectedMode === 'random') {
                localPool = Object.values(vocabularyData).flat().sort(() => Math.random() - 0.5).slice(0, 50);
            } else {
                localPool = [...vocabularyData[selectedCategory]];
            }

            localPool.forEach((item, index) => {
                let leftText = ''; let rightText = '';
                if (selectedMode === 'de-en') { leftText = item.de; rightText = item.en; }
                else if (selectedMode === 'en-de') { leftText = item.en; rightText = item.de; }
                else {
                    if (Math.random() > 0.5) { leftText = item.de; rightText = `(${item.en})`; }
                    else { leftText = item.en; rightText = `(${item.de})`; }
                }

                const node = document.createElement('div');
                node.className = 'flow-node';
                node.innerHTML = `<div class="node-left">${leftText}</div><div class="node-right">${rightText}</div>`;
                container.appendChild(node);

                if (index < localPool.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'flow-connector';
                    container.appendChild(connector);
                }
            });
        }

        function initiateQuizFlow() {
            let sourcePool = [];
            if (selectedCategory === 'all_mixed') {
                sourcePool = Object.values(vocabularyData).flat();
            } else {
                sourcePool = [...vocabularyData[selectedCategory]];
            }

            const shuffled = sourcePool.sort(() => Math.random() - 0.5);
            quizQuestionsPool = shuffled.slice(0, 10).map(item => {
                const directionFlag = Math.random() > 0.5; 
                return {
                    questionWord: directionFlag ? item.de : item.en,
                    correctTarget: directionFlag ? item.en : item.de,
                    isGermanQuestion: directionFlag
                };
            });

            currentQuestionIdx = 0;
            userQuizScore = 0;
            isOptionProcessing = false;
            renderNextQuizQuestionCard();
            navigateTo('quizScreen');
        }

        function renderNextQuizQuestionCard() {
            const container = document.getElementById('quizContainerBox');
            container.innerHTML = '';

            if (currentQuestionIdx >= quizQuestionsPool.length) {
                container.innerHTML = `
                    <div class="score-layout">
                        <div class="quiz-progress">Session Completed</div>
                        <h2>Your Performance Metrics</h2>
                        <div class="score-val">${userQuizScore} / ${quizQuestionsPool.length}</div>
                        <button class="floating-opt" style="width:100%;" onclick="navigateTo('categoryScreen')">Return to Categories</button>
                    </div>
                `;
                return;
            }

            const currentQ = quizQuestionsPool[currentQuestionIdx];
            const globalFlatPool = Object.values(vocabularyData).flat();
            const filteredDistractions = globalFlatPool
                .map(i => currentQ.isGermanQuestion ? i.en : i.de)
                .filter(val => val !== currentQ.correctTarget);
            
            const distinctWrongOptions = [...new Set(filteredDistractions)].sort(() => Math.random() - 0.5).slice(0, 3);
            const localizedOptionsList = [currentQ.correctTarget, ...distinctWrongOptions].sort(() => Math.random() - 0.5);

            const trackingHeader = document.createElement('div');
            trackingHeader.className = 'quiz-progress';
            trackingHeader.textContent = `Question ${currentQuestionIdx + 1} of ${quizQuestionsPool.length}`;
            container.appendChild(trackingHeader);

            const labelQuestion = document.createElement('div');
            labelQuestion.className = 'quiz-question';
            labelQuestion.innerHTML = `<span style="font-size:14px; display:block; opacity:0.5; font-weight:500;">Translate:</span> "${currentQ.questionWord}"`;
            container.appendChild(labelQuestion);

            const optionsWrapperGrid = document.createElement('div');
            optionsWrapperGrid.className = 'quiz-options-list';

            localizedOptionsList.forEach(optString => {
                const btnNode = document.createElement('button');
                btnNode.className = 'quiz-btn';
                btnNode.textContent = optString;
                
                btnNode.addEventListener('click', () => {
                    if(isOptionProcessing) return;
                    isOptionProcessing = true;

                    if (optString === currentQ.correctTarget) {
                        btnNode.classList.add('correct');
                        userQuizScore++;
                    } else {
                        btnNode.classList.add('wrong');
                        Array.from(optionsWrapperGrid.children).forEach(child => {
                            if(child.textContent === currentQ.correctTarget) child.classList.add('correct');
                        });
                    }

                    setTimeout(() => {
                        currentQuestionIdx++;
                        isOptionProcessing = false;
                        renderNextQuizQuestionCard();
                    }, 1400);
                });
                optionsWrapperGrid.appendChild(btnNode);
            });
            container.appendChild(optionsWrapperGrid);
        }
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
